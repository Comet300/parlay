<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientTransform="rotate(55)">
      <stop offset="0%" stop-color="#0369A1"/>
      <stop offset="50%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="rgba(255,255,255,0.18)"/>
    </pattern>
    <linearGradient id="dotMask" x1="1" y1="0" x2="0" y2="0">
      <stop offset="20%" stop-color="white" stop-opacity="1"/>
      <stop offset="60%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="fadeMask">
      <rect width="1200" height="630" fill="url(#dotMask)"/>
    </mask>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)" mask="url(#fadeMask)"/>
  <text x="80" y="490" fill="white" font-family="Sora, system-ui, -apple-system, sans-serif"
        font-size="128" font-weight="800" letter-spacing="-0.04em">parlay<tspan fill="#FED7AA">.</tspan></text>
  <text x="80" y="540" fill="rgba(255,255,255,0.8)" font-family="Sora, system-ui, -apple-system, sans-serif"
        font-size="36" font-weight="400">Visual research flow builder</text>
</svg>
